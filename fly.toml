app = 'pump-or-rug-api'
primary_region = 'iad'

[build]
  dockerfile = 'server/Dockerfile'
  ignorefile = 'server/.dockerignore'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'

[mounts]
  source = 'data'
  destination = '/data'

[[http_service.checks]]
  grace_period = '10s'
  interval = '30s'
  method = 'GET'
  timeout = '5s'
  path = '/health'
